<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الطيبات الذكي - النسخة العبقرية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --dark-bg: #0f0f0c; --card-bg: #1a1a15; --gold-primary: #d4af37; --white: #ffffff; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--dark-bg); color: var(--white); margin: 0; }
        nav { display: flex; justify-content: center; gap: 10px; padding: 15px; background: rgba(0,0,0,0.8); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #2a2a20; }
        nav button { background: none; border: 1px solid var(--gold-primary); color: var(--gold-primary); padding: 8px 18px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        nav button.active { background: var(--gold-primary); color: var(--dark-bg); }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .meal-card { background: var(--card-bg); border-radius: 15px; padding: 20px; border: 1px solid #2a2a20; }
        .chat-box { background: var(--card-bg); border-radius: 15px; height: 60vh; display: flex; flex-direction: column; border: 1px solid #2a2a20; }
        #chat-display { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 10px; max-width: 80%; }
        .user-msg { background: var(--gold-primary); color: #000; align-self: flex-start; }
        .ai-msg { background: #2a2a20; color: #fff; align-self: flex-end; border: 1px solid var(--gold-primary); }
        .chat-input { padding: 15px; display: flex; gap: 10px; background: #000; }
        .chat-input input { flex: 1; background: none; border: 1px solid #333; color: white; padding: 10px; border-radius: 8px; }
        .chat-input button { background: var(--gold-primary); border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

<nav>
    <button id="btn-home" class="active" onclick="showPage('home')">الرئيسية</button>
    <button id="btn-meals" onclick="showPage('meals')">الوجبات</button>
    <button id="btn-chat" onclick="showPage('chat')">المساعد العبقري ✨</button>
</nav>

<div class="container">
    <div id="home-page">
        <h1 style="text-align:center; color:var(--gold-primary)">نظام الطيبات</h1>
        <p style="text-align:center">دليل الصحة والتعافي للدكتور ضياء العوضي</p>
    </div>

    <div id="meals-page" class="hidden">
        <div style="text-align:center; margin-bottom:20px;">
            <button onclick="renderMeals('breakfast')" style="color:white; background:none; border:1px solid var(--gold-primary); padding:5px 15px; border-radius:10px; cursor:pointer;">إفطار</button>
            <button onclick="renderMeals('lunch')" style="color:white; background:none; border:1px solid var(--gold-primary); padding:5px 15px; border-radius:10px; cursor:pointer;">غداء</button>
            <button onclick="renderMeals('dinner')" style="color:white; background:none; border:1px solid var(--gold-primary); padding:5px 15px; border-radius:10px; cursor:pointer;">عشاء</button>
        </div>
        <div id="meal-content" class="grid-container"></div>
    </div>

    <div id="chat-page" class="hidden">
        <div class="chat-box">
            <div id="chat-display">
                <div class="msg ai-msg">أهلاً بك يا بطل! أنا مساعدك الذكي المتطور. كيف يمكنني مساعدتك اليوم في رحلة الطيبات؟</div>
            </div>
            <div class="chat-input">
                <input type="text" id="user-query" placeholder="اكتب سؤالك هنا (عربي أو English)...">
                <button onclick="handleChat()">إرسال</button>
            </div>
        </div>
    </div>
</div>

<script>
    const meals = {
        breakfast: Array.from({length: 30}, (_, i) => ({t: `يوم ${i+1}`, d: "توست ردة + جبنة رومي/شيدر + قشطة/مربى + فاكهة"})),
        lunch: Array.from({length: 11}, (_, i) => ({t: `غداء ${i+1}`, d: "لحم بقري/ضاني/سمك مشوي + أرز مفلفل بالسمن البلدي"})),
        dinner: Array.from({length: 11}, (_, i) => ({t: `عشاء ${i+1}`, d: "بطاطس مهروسة بالسمن + توست بالنوتيلا + عسل"})),
    };

    const knowledge = {
        allowed: ["أرز", "بطاطس", "لحم", "سمك", "سمن", "قشطة", "رومي", "شيدر", "نوتيلا", "عسل", "توست"],
        forbidden: ["فراخ", "بيض", "لبن", "دقيق", "زيت نباتي", "خيار"],
        greetings: ["هلا", "مرحبا", "هاي", "صباح", "مساء", "hello", "hi"]
    };

    function showPage(p) {
        document.getElementById('home-page').classList.add('hidden');
        document.getElementById('meals-page').classList.add('hidden');
        document.getElementById('chat-page').classList.add('hidden');
        document.getElementById(p + '-page').classList.remove('hidden');
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + p).classList.add('active');
        if(p === 'meals') renderMeals('breakfast');
    }

    function renderMeals(cat) {
        document.getElementById('meal-content').innerHTML = meals[cat].map((m, i) => `
            <div class="meal-card"><strong>${m.t}</strong><p>${m.d}</p></div>
        `).join('');
    }

    function handleChat() {
        const input = document.getElementById('user-query');
        const val = input.value.trim().toLowerCase();
        if(!val) return;
        const display = document.getElementById('chat-display');
        display.innerHTML += `<div class="msg user-msg">${input.value}</div>`;
        
        let res = "أهلاً بك! لست متأكداً، لكن تذكر: الطيبات هي اللحوم والأرز والبطاطس والخبز الأسمر. ابتعد عن الدجاج والبيض واللبن.";
        
        if (knowledge.greetings.some(g => val.includes(g))) {
            res = "أهلاً بك يا صديقي! كيف حالك؟ أنا هنا لمساعدتك في فهم نظام الطيبات بكل لغات العالم. ماذا تود أن تسأل؟";
        } else if (knowledge.forbidden.some(f => val.includes(f))) {
            res = "⚠️ انتبه! هذا المكون ممنوع في نظام الطيبات لأنه يسبب التهابات.";
        } else if (knowledge.allowed.some(a => val.includes(a))) {
            res = "✅ ممتاز! هذا مسموح به في الطيبات وصديق جداً للأمعاء.";
        } else if (val.includes("thank") || val.includes("شكرا")) {
            res = "العفو! هذا واجبي. بالتوفيق في امتحانك غداً وفي رحلتك للصحة!";
        }

        setTimeout(() => {
            display.innerHTML += `<div class="msg ai-msg">${res}</div>`;
            display.scrollTop = display.scrollHeight;
        }, 500);
        input.value = "";
    }
</script>
</body>
</html>
