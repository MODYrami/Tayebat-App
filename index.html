<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الطيبات - الجدول الكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --dark-bg: #0f0f0c; --card-bg: #1a1a15; --gold: #d4af37; --white: #ffffff; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--dark-bg); color: var(--white); margin: 0; }
        nav { display: flex; justify-content: center; gap: 10px; padding: 15px; background: #000; border-bottom: 1px solid #2a2a20; position: sticky; top: 0; z-index: 1000; }
        nav button { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 8px 18px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        nav button.active { background: var(--gold); color: #000; }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .info-card { background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid #2a2a20; margin-bottom: 20px; text-align: center; }
        .social-link { display: block; background: #2a2a10; color: var(--gold); padding: 12px; border-radius: 10px; text-decoration: none; margin: 10px 0; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .meal-card { background: var(--card-bg); border-radius: 15px; padding: 20px; border: 1px solid #2a2a20; }
        .chat-box { background: var(--card-bg); border-radius: 15px; height: 60vh; display: flex; flex-direction: column; border: 1px solid #2a2a20; }
        #chat-display { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 10px; max-width: 80%; line-height: 1.5; }
        .user-msg { background: var(--gold); color: #000; align-self: flex-start; }
        .ai-msg { background: #2a2a20; color: #fff; align-self: flex-end; border: 1px solid var(--gold); }
        .chat-input { padding: 15px; display: flex; gap: 10px; background: #000; }
        .chat-input input { flex: 1; background: none; border: 1px solid #333; color: white; padding: 10px; border-radius: 8px; }
        .chat-input button { background: var(--gold); border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

<nav>
    <button id="btn-home" class="active" onclick="showPage('home')">الرئيسية</button>
    <button id="btn-meals" onclick="showPage('meals')">الوجبات</button>
    <button id="btn-chat" onclick="showPage('chat')">المساعد الذكي ✨</button>
</nav>

<div class="container">
    <div id="home-page">
        <div class="info-card">
            <h1 style="color:var(--gold)">دكتور ضياء العوضي</h1>
            <p>نظام الطيبات للتعافي من الأمراض المزمنة</p>
            <a href="https://www.youtube.com/@DrDhiaaElawadi" class="social-link">قناة اليوتيوب الرسمية</a>
            <a href="https://www.facebook.com/DhiaaElawadi" class="social-link">صفحة الفيسبوك الرسمية</a>
        </div>
    </div>

    <div id="meals-page" class="hidden">
        <div style="text-align:center; margin-bottom:20px;">
            <button onclick="renderMeals('breakfast')" style="color:white; background:none; border:1px solid var(--gold); padding:5px 15px; border-radius:10px; cursor:pointer;">إفطار (30 يوم)</button>
            <button onclick="renderMeals('lunch')" style="color:white; background:none; border:1px solid var(--gold); padding:5px 15px; border-radius:10px; cursor:pointer;">غداء (11)</button>
            <button onclick="renderMeals('dinner')" style="color:white; background:none; border:1px solid var(--gold); padding:5px 15px; border-radius:10px; cursor:pointer;">عشاء (11)</button>
        </div>
        <div id="meal-content" class="grid"></div>
    </div>

    <div id="chat-page" class="hidden">
        <div class="chat-box">
            <div id="chat-display"><div class="msg ai-msg">أهلاً بك! أنا مساعدك الذكي المتطور. اسألني عن أي شيء في نظام الطيبات.</div></div>
            <div class="chat-input">
                <input type="text" id="user-query" placeholder="مثال: هل العسل مسموح؟">
                <button onclick="handleChat()">إرسال</button>
            </div>
        </div>
    </div>
</div>

<script>
    const meals = {
        breakfast: [
            {t: "اليوم 1", d: "3 توست حبوب كاملة + جبن رومي + عسل + تفاحة"},
            {t: "اليوم 2", d: "بطاطس مسلوقة + جبن شيدر مطبوخ + عصير جوافة"},
            {t: "اليوم 3", d: "2 توست حبوب كاملة + نوتيلا + موزة"},
            {t: "اليوم 4", d: "ذرة مسلوقة + جبن رومي + عصير جوافة"},
            {t: "اليوم 5", d: "2 توست حبوب كاملة + مربى + كمثرى"},
            {t: "اليوم 6", d: "بطاطس مشوية + جبن شيدر مطبوخ + عصير جوافة"},
            {t: "اليوم 7", d: "3 توست حبوب كاملة + قشطة طبيعية + عنب"},
            {t: "اليوم 8", d: "ذرة مشوية + جبن رومي + عصير معلب جوافة"},
            {t: "اليوم 9", d: "بطاطس مسلوقة + مربى + تمر"},
            {t: "اليوم 10", d: "2 توست حبوب كاملة + نوتيلا + تفاحة"},
            {t: "اليوم 11", d: "3 توست حبوب كاملة + عسل + موزة"},
            {t: "اليوم 12", d: "قشطة طبيعية + عنب + عصير جوافة"},
            {t: "اليوم 13", d: "بطاطس مسلوقة + جبن رومي + عصير جوافة"},
            {t: "اليوم 14", d: "2 توست حبوب كاملة + مربى + تفاحة"},
            {t: "اليوم 15", d: "ذرة مسلوقة + جبن شيدر مطبوخ + عصير جوافة"},
            {t: "اليوم 16", d: "3 توست حبوب كاملة + قشطة طبيعية + كمثرى"},
            {t: "اليوم 17", d: "2 توست حبوب كاملة + نوتيلا + عنب"},
            {t: "اليوم 18", d: "بطاطس مسلوقة + جبن رومي + عصير جوافة"},
            {t: "اليوم 19", d: "بطاطس مسلوقة + جبن رومي + عصير جوافة"},
            {t: "اليوم 20", d: "3 توست حبوب كاملة + قشطة طبيعية + تمر"},
            {t: "اليوم 21", d: "ذرة مشوية + جبن رومي + عصير جوافة"},
            {t: "اليوم 22", d: "2 توست حبوب كاملة + مربى + موزة"},
            {t: "اليوم 23", d: "ذرة مسلوقة + جبن رومي + عصير جوافة"},
            {t: "اليوم 24", d: "3 توست حبوب كاملة + عسل + تفاحة"},
            {t: "اليوم 25", d: "بطاطس مسلوقة + جبن شيدر مطبوخ + عصير جوافة"},
            {t: "اليوم 26", d: "2 توست حبوب كاملة + قشطة طبيعية + تمر"},
            {t: "اليوم 27", d: "ذرة مشوية + جبن رومي + عصير جوافة"},
            {t: "اليوم 28", d: "3 توست حبوب كاملة + مربى + كمثرى"},
            {t: "اليوم 29", d: "بطاطس مشوية + جبن شيدر مطبوخ + عصير جوافة"},
            {t: "اليوم 30", d: "2 توست حبوب كاملة + نوتيلا + عنب"}
        ],
        lunch: [
            {t: "وجبة 1", d: "سمك مشوي + أرز أبيض بالسمن البلدي"}, {t: "وجبة 2", d: "لحم ضاني مسلوق ومحمر + أرز وشوربة"},
            {t: "وجبة 3", d: "حمام محشي أرز بالسمن البلدي"}, {t: "وجبة 4", d: "لحم بقري موزة + أرز أبيض"},
            {t: "وجبة 5", d: "سمك ماكريل مشوي + أرز صيادية"}, {t: "وجبة 6", d: "أرانب مسلوقة ومحمرة + أرز"},
            {t: "وجبة 7", d: "كفتة بقري مشوية + أرز بالسمن"}, {t: "وجبة 8", d: "صينية بطاطس بشوربة اللحم + أرز"},
            {t: "وجبة 9", d: "طاجن باميا بالسمن البلدي + أرز"}, {t: "وجبة 10", d: "كوسة مسلوقة + قطع لحم بقري + أرز"},
            {t: "وجبة 11", d: "كبدة بقري محمرة في سمن بلدي + توست ردة"}
        ],
        dinner: [
            {t: "وجبة 1", d: "بطاطس مهروسة بالقشطة والسمن البلدي"}, {t: "وجبة 2", d: "أرز دافئ بالزبدة والسكر الأبيض"},
            {t: "وجبة 3", d: "توست ردة + جبنة رومي + قشطة طبيعية"}, {t: "وجبة 4", d: "بطاطس مقلية في سمن بلدي"},
            {t: "وجبة 5", d: "توست ردة + جبنة شيدر + عسل نحل"}, {t: "وجبة 6", d: "مربى فراولة + قشطة + توست ردة"},
            {t: "وجبة 7", d: "حلاوة طحينية + قشطة + توست ردة"}, {t: "وجبة 8", d: "بطاطس مسلوقة بزيت الزيتون"},
            {t: "وجبة 9", d: "تمر رطب + قشطة فلاحي"}, {t: "وجبة 10", d: "توست نوتيلا + قطع موز"},
            {t: "وجبة 11", d: "أرز بمياه وسكر وقشطة (بديل اللبن)"}
        ]
    };

    function showPage(p) {
        document.getElementById('home-page').classList.add('hidden');
        document.getElementById('meals-page').classList.add('hidden');
        document.getElementById('chat-page').classList.add('hidden');
        document.getElementById(p + '-page').classList.remove('hidden');
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + p).classList.add('active');
        if(p === 'meals') renderMeals('breakfast');
    }

    function renderMeals(cat) {
        document.getElementById('meal-content').innerHTML = meals[cat].map(m => `
            <div class="meal-card"><strong>${m.t}</strong><p>${m.d}</p></div>
        `).join('');
    }

    function handleChat() {
        const input = document.getElementById('user-query');
        const val = input.value.trim().toLowerCase();
        if(!val) return;
        const display = document.getElementById('chat-display');
        display.innerHTML += `<div class="msg user-msg">${input.value}</div>`;
        
        let res = "أهلاً بك! تذكر قاعدة الطيبات: لحوم، أرز، بطاطس، خبز أسمر مسموحة. دجاج، بيض، لبن ممنوعة.";
        if (["هلا", "مرحبا", "هاي", "صباح", "hi", "hello"].some(g => val.includes(g))) {
            res = "أهلاً بك يا بطل! أنا مساعدك الذكي المتطور، كيف يمكنني مساعدتك في رحلة التعافي اليوم؟";
        } else if (["فراخ", "بيض", "لبن", "دقيق", "زيت نباتي"].some(f => val.includes(f))) {
            res = "⚠️ انتبه! هذا المكون ممنوع تماماً في نظام الطيبات لأنه يسبب التهابات للأمعاء.";
        } else if (["ارز", "بطاطس", "لحم", "سمك", "سمن", "قشطة", "رومي", "نوتيلا", "عسل"].some(a => val.includes(a))) {
            res = "✅ ممتاز! هذا العنصر مسموح به في الطيبات وصديق جداً للأمعاء.";
        }
        
        setTimeout(() => {
            display.innerHTML += `<div class="msg ai-msg">${res}</div>`;
            display.scrollTop = display.scrollHeight;
        }, 400);
        input.value = "";
    }
</script>
</body>
</html>
